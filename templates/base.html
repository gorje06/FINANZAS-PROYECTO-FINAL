<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinanCuota</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <h1 class="brand">
        <img src="{{ url_for('static', filename='logo-financuota.svg') }}" alt="FinanCuota logo" />
        <span>FinanCuota</span>
      </h1>
      {% if session.get("user_id") %}
      <a href="{{ url_for('logout') }}">Cerrar sesión</a>
      {% endif %}
    </header>
    <main class="container">
      {% with messages = get_flashed_messages() %}
      {% if messages %}
      <div class="flash">
        {% for m in messages %}
        <p>{{ m }}</p>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
