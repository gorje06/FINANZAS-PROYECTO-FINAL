<!doctype html>
<!-- FinanCuota · gorje -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinanCuota</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-slot" aria-hidden="true"></div>
      <h1 class="brand">
        <span class="brand-logo" aria-hidden="true">
          <img
            src="{{ url_for('static', filename='financuota-logo-informe-upc.png') }}"
            alt=""
            width="96"
            height="96"
          />
        </span>
        <span class="brand-title">FinanCuota</span>
      </h1>
      <div class="topbar-slot topbar-slot--end">
        {% if session.get("user_id") %}
        <a href="{{ url_for('logout') }}">Cerrar sesión</a>
        {% endif %}
      </div>
    </header>
    <main class="container">
      {% with messages = get_flashed_messages() %}
      {% if messages %}
      <div class="flash">
        {% for m in messages %}
        <p>{{ m }}</p>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
