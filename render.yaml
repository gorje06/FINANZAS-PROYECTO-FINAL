services:
  - type: web
    name: financuota
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: FINANCUOTA_DB_PATH
        value: /var/data/financuota.db
    disk:
      name: financuota-data
      mountPath: /var/data
      sizeGB: 1
