# Render FREE + Turso (SQLite en la nube, gratis, persistente)

services:
  - type: web
    name: financuota
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      # Crear en https://turso.tech y pegar en Render -> Environment:
      # - key: TURSO_DATABASE_URL
      #   sync: false
      # - key: TURSO_AUTH_TOKEN
      #   sync: false
